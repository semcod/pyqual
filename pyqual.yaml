pipeline:
  name: quality-loop-with-llx

  # Quality gates — pipeline iterates until ALL pass
  metrics:
    cc_max: 15           # cyclomatic complexity per function
    critical_max: 25     # functions above complexity threshold
    vallm_pass_min: 50   # vallm validation pass rate (%)
    coverage_min: 20     # line coverage (%) — minimum threshold
    coverage_branch_min: 15  # branch coverage (%) — minimum threshold
    completion_rate_min: 75  # percentage of passed gates required for closure — realistic threshold
    # Security gates (enabled):
    vuln_high_max: 0         # pip-audit high severity CVEs
    vuln_critical_max: 0     # pip-audit critical severity CVEs
    ruff_errors_max: 50      # ruff lint errors (realistic threshold)
    secrets_found_max: 0     # detect-secrets findings
    mypy_errors_max: 100      # mypy type errors (realistic for gradual typing)

  # Pipeline stages using new built-in tools
  stages:
    - name: setup
      tool: setup-deps
      when: first_iteration
      timeout: 300

    - name: setup_tasks
      run: |
        planfile sync github
        planfile sync markdown
      when: first_iteration
      optional: true

    - name: pip-audit
      tool: pip-audit
      when: always
      optional: true

    - name: ruff-lint
      tool: ruff
      when: always
      optional: true

    - name: detect-secrets
      tool: detect-secrets
      when: always
      optional: true

    - name: mypy-types
      tool: mypy
      when: always
      optional: true

    - name: prefact
      tool: prefact
      optional: true
      when: metrics_fail
      timeout: 900

    # Custom fix - uses explicit LLM_MODEL
    - name: fix
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        python3 pyqual/custom_fix.py 2>&1 | tee .pyqual/fix_output.log || echo "Fix stage skipped"
      when: metrics_fail
      optional: true
      timeout: 1800

    - name: verify
      tool: vallm-verify
      optional: true
      when: after_fix

    - name: report
      tool: report
      when: always
      optional: true

    - name: todo_fix
      tool: todo-fix
      when: metrics_pass
      optional: true
      timeout: 1800

    - name: close_tasks
      tool: close-tasks
      when: always
      optional: true

    - name: push
      tool: git-push
      when: always
      optional: true

    - name: publish
      tool: make-publish
      when: metrics_pass
      optional: true

    - name: automerge
      tool: attack-merge
      when: always
      optional: true

    - name: markdown_report
      tool: markdown-report
      when: always
      optional: true

  loop:
    max_iterations: 3
    on_fail: report

  env:
    LLM_MODEL: openrouter/openai/gpt-5-mini
    LLX_DEFAULT_TIER: balanced
    LLX_VERBOSE: true
