pipeline:
  name: quality-loop-with-llx

  # Quality gates — pipeline iterates until ALL pass
  metrics:
    cc_max: 15           # cyclomatic complexity per function
    vallm_pass_min: 90   # vallm validation pass rate (%)
    coverage_min: 55     # test coverage (%) — realistic for current codebase
    # Security gates (uncomment to enable):
    # vuln_high_max: 0     # pip-audit high severity CVEs
    # bandit_high_max: 0   # bandit high severity issues
    # secrets_found_max: 0 # trufflehog/gitleaks secrets

  # Pipeline stages — use 'tool:' for built-in presets or 'run:' for custom
  stages:
    # Verify/install all tool dependencies before pipeline starts
    - name: setup
      run: |
        set -e
        echo "=== pyqual dependency check ==="
        # Python tools (pip)
        for pkg in code2llm vallm prefact llx pytest-cov goal; do
          if python -m pip show "$pkg" >/dev/null 2>&1; then
            echo "  ✓ $pkg"
          else
            echo "  ✗ $pkg — installing…"
            pip install -q "$pkg" || echo "  ⚠ $pkg install failed (optional)"
          fi
        done
        # Node tools (claude)
        if command -v claude >/dev/null 2>&1; then
          echo "  ✓ claude $(claude --version 2>/dev/null)"
        else
          echo "  ✗ claude — installing…"
          npm install -g --prefix="$HOME/.local" @anthropic-ai/claude-code 2>/dev/null \
            && echo "  ✓ claude installed" \
            || echo "  ⚠ claude install failed (fix stage will use llx fallback)"
        fi
        # Verify ANTHROPIC_API_KEY for Claude Code
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          echo "  ✓ ANTHROPIC_API_KEY is set"
        else
          echo "  ⚠ ANTHROPIC_API_KEY not set — Claude Code fix stage will not work"
        fi
        echo "=== setup done ==="
      when: first_iteration
      timeout: 300

    - name: analyze
      tool: code2llm
      when: first_iteration

    - name: validate
      run: vallm batch pyqual tests --recursive --format toon --output ./project
      when: always

    # Security scans (uncomment to enable):
    # - name: audit
    #   tool: pip-audit
    #   optional: true
    # - name: bandit
    #   tool: bandit
    #   optional: true

    - name: test
      tool: pytest
      optional: true

    - name: prefact
      tool: prefact
      optional: true
      when: metrics_fail
      timeout: 900

    # Claude Code fix — uses Claude Code CLI (Sonnet 4.5) in non-interactive mode
    # Auth: `claude auth login` (local) or ANTHROPIC_API_KEY (CI)
    - name: claude_fix
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        ERRORS=""
        [ -f .pyqual/errors.json ] && ERRORS=$(cat .pyqual/errors.json)
        [ -f TODO.md ] && ERRORS="$ERRORS
        $(cat TODO.md)"
        claude -p "Fix all quality gate failures in this Python project. Apply changes directly.

        $ERRORS" \
          --model claude-sonnet-4-5-20250514 \
          --allowedTools "Edit,Read,Write,Bash(git diff),Bash(python),Bash(pytest -x)" \
          --output-format text
      when: metrics_fail
      timeout: 1800

    # LLX fallback (uncomment if Claude Code unavailable)
    # - name: fix
    #   tool: llx-fix
    #   when: metrics_fail
    #   timeout: 1800

    - name: verify
      run: vallm batch pyqual tests --recursive --format toon --output ./project
      optional: true
      when: after_fix
      timeout: 300

    # Generate metrics report (YAML) and update README.md badges
    - name: report
      tool: report
      when: metrics_pass
      optional: true

    # Goal-powered push & publish (run only when all gates pass)
    - name: push
      run: yes | goal push --bump patch --no-publish --todo --model ${LLM_MODEL}
      when: metrics_pass
      optional: true
      timeout: 120

    - name: publish
      run: goal publish
      when: metrics_pass
      optional: true
      timeout: 300

  # Loop behavior
  loop:
    max_iterations: 3
    on_fail: report      # report | create_ticket | block

  # Environment (optional)
  env:
    LLM_MODEL: openrouter/qwen/qwen3-coder-next
    LLX_DEFAULT_TIER: balanced
    LLX_VERBOSE: true
    # Claude Code — set ANTHROPIC_API_KEY in .env or CI secrets
    # Local:  echo 'ANTHROPIC_API_KEY=sk-ant-...' >> .env
    # GitHub: Settings → Secrets → ANTHROPIC_API_KEY
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
