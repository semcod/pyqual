pipeline:
  name: ticket-workflow-example

  metrics:
    coverage_min: 80
    cc_max: 15
    ruff_errors_max: 5

  stages:
    - name: analyze
      tool: code2llm

    - name: lint
      tool: ruff

    - name: test
      tool: pytest

  loop:
    max_iterations: 2
    on_fail: create_ticket   # auto-sync TODO.md via planfile on gate failure
