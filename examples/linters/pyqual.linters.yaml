# Linter-Focused pyqual Configuration
#
# This configuration enforces code style and quality via linters.
# Use with: pyqual run --config pyqual.linters.yaml

pipeline:
  name: linter-quality-loop

  metrics:
    # Linter gates
    ruff_errors_max: 0        # Modern Python linter
    mypy_errors_max: 0        # Type checking
    pylint_score_min: 9.0     # Pylint score threshold
    flake8_errors_max: 0      # Style guide enforcement

    # Code quality
    cc_max: 10                # Stricter complexity
    mi_min: 70                # Maintainability index
    outdated_deps_max: 3      # Keep dependencies fresh

    # Test coverage
    coverage_min: 90          # High coverage requirement

  stages:
    # 1. Dependency freshness check
    - name: deps
      run: pip list --outdated --format=json > .pyqual/outdated.json 2>/dev/null || echo '[]' > .pyqual/outdated.json

    # 2. Ruff - ultra-fast modern linter
    - name: ruff
      run: ruff check . --output-format=json > .pyqual/ruff.json 2>/dev/null || ruff check . --format=json > .pyqual/ruff.json || echo '[]' > .pyqual/ruff.json

    # 3. MyPy - type checking
    - name: mypy
      run: mypy . --show-error-codes --json > .pyqual/mypy.json 2>&1 || mypy . --show-error-codes > .pyqual/mypy.txt; echo '[]' > .pyqual/mypy.json

    # 4. Pylint - comprehensive analysis
    - name: pylint
      run: pylint . --output-format=json > .pyqual/pylint.json 2>/dev/null || pylint . --output-format=json > .pyqual/pylint.json || echo '{"messages": []}' > .pyqual/pylint.json

    # 5. Flake8 - style enforcement
    - name: flake8
      run: flake8 . --format=json > .pyqual/flake8.json 2>/dev/null || flake8 . --format=json > .pyqual/flake8.json || echo '[]' > .pyqual/flake8.json

    # 6. Radon - complexity analysis
    - name: radon
      run: radon mi . -j > .pyqual/radon_mi.json 2>/dev/null || echo '{}' > .pyqual/radon_mi.json

    # 7. Code analysis
    - name: analyze
      run: code2llm ./ -f toon,evolution

    # 8. Validation
    - name: validate
      run: vallm batch ./ --recursive --errors-json > .pyqual/errors.json

    # 9. Auto-fix linter issues
    - name: lint_fix
      run: |
        echo "Auto-fixing linter issues..."
        ruff check . --fix 2>/dev/null || true
        # Connect llx here for complex fixes
      when: metrics_fail

    # 10. Tests
    - name: test
      run: pytest --cov --cov-report=json:.pyqual/coverage.json --timeout=60

  loop:
    max_iterations: 3
    on_fail: report

  env:
    LLM_MODEL: openrouter/qwen/qwen3-coder-next
