pipeline:
  name: python-linters

  metrics:
    # Ruff gates
    ruff_errors_max: 10
    ruff_fatal_max: 0
    ruff_warnings_max: 20

    # Pylint gates
    pylint_score_min: 8.0
    pylint_errors_max: 5
    pylint_warnings_max: 10

    # Flake8 gates
    flake8_violations_max: 20
    flake8_errors_max: 5

    # Mypy gates
    mypy_errors_max: 5

    # Documentation gates
    docstring_coverage_min: 90
    docstring_missing_max: 10

  stages:
    - name: ruff
      tool: ruff
      optional: true

    - name: pylint
      tool: pylint
      optional: true

    - name: flake8
      tool: flake8
      optional: true

    - name: mypy
      tool: mypy
      optional: true

    - name: interrogate
      tool: interrogate
      optional: true

  loop:
    max_iterations: 1
    on_fail: report
