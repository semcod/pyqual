pipeline:
  name: llm-fix-example

  metrics:
    llx_fix_success_min: 1
    llx_fix_returncode_eq: 0
    llx_tool_calls_min: 2

  stages:
    - name: analyze
      tool: code2llm

    - name: validate
      tool: vallm
      optional: true

    - name: llx_mcp_refactor
      run: pyqual mcp-refactor --workdir . --project-path /workspace/project --issues .pyqual/errors.json --output .pyqual/llx_mcp.json
      when: metrics_fail
      timeout: 900

    - name: test
      tool: pytest

  loop:
    max_iterations: 3
    on_fail: report

  env:
    PYQUAL_LLX_MCP_URL: http://localhost:8000/sse
    PYQUAL_LLX_PROJECT_PATH: /workspace/project
    PYQUAL_LLX_USE_DOCKER: "false"
