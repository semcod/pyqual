pipeline:
  name: security-scan

  metrics:
    # Bandit security gates
    bandit_high_max: 0
    bandit_medium_max: 5
    bandit_low_max: 10

    # Vulnerability gates
    vuln_critical_max: 0
    vuln_high_max: 0
    vuln_medium_max: 5

    # Secrets gates
    secrets_found_max: 0
    secrets_severity_max: 0

    # SBOM compliance gates
    sbom_compliance_min: 95
    license_blacklist_max: 0

  stages:
    - name: bandit
      run: bandit -r . -f json -o .pyqual/bandit.json 2>/dev/null || true

    - name: pip-audit
      run: pip-audit --format=json --output=.pyqual/vulns.json 2>/dev/null || true

    - name: secrets-trufflehog
      run: |
        if command -v trufflehog &> /dev/null; then
          trufflehog git file://. --json > .pyqual/secrets.json 2>/dev/null || true
        fi

    - name: sbom
      run: |
        if command -v cyclonedx-py &> /dev/null; then
          cyclonedx-py -r -o .pyqual/sbom.json 2>/dev/null || true
        fi

    - name: check
      run: pyqual gates

  loop:
    max_iterations: 1
    on_fail: block
