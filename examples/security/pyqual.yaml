pipeline:
  name: security-scan

  metrics:
    # Bandit security gates
    bandit_high_max: 0
    bandit_medium_max: 5
    bandit_low_max: 10

    # Vulnerability gates
    vuln_critical_max: 0
    vuln_high_max: 0
    vuln_medium_max: 5

    # Secrets gates
    secrets_found_max: 0
    secrets_severity_max: 0

    # SBOM compliance gates
    sbom_compliance_min: 95
    license_blacklist_max: 0

  stages:
    - name: bandit
      tool: bandit
      optional: true

    - name: pip-audit
      tool: pip-audit
      optional: true

    - name: secrets
      tool: trufflehog
      optional: true

    - name: sbom
      tool: cyclonedx
      optional: true

  loop:
    max_iterations: 1
    on_fail: block
