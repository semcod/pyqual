# Security-Focused pyqual Configuration
#
# This configuration prioritizes security scanning in the pipeline.
# Use with: pyqual run --config pyqual.security.yaml

pipeline:
  name: security-first-loop

  metrics:
    # Security gates - strict thresholds
    vuln_critical_max: 0    # Zero critical CVEs allowed
    vuln_high_max: 0          # Zero high severity vulnerabilities
    bandit_high_max: 0        # Zero high confidence security issues
    secrets_found_max: 0      # No hardcoded secrets allowed

    # Quality gates
    cc_max: 15
    coverage_min: 80

  stages:
    # 1. Static Application Security Testing (SAST)
    - name: bandit
      run: bandit -r . -f json -o .pyqual/bandit.json || true

    # 2. Dependency vulnerability scan
    - name: pip_audit
      run: pip-audit --format=json -o .pyqual/pip_audit.json || true

    # 3. Secret detection
    - name: trufflehog
      run: trufflehog filesystem . --json > .pyqual/trufflehog.json 2>/dev/null || true

    # 4. SBOM generation and license check
    - name: sbom
      run: |
        pip-licenses --format=json --output-file=.pyqual/sbom.json 2>/dev/null || echo '{"components": []}' > .pyqual/sbom.json

    # 5. Code analysis
    - name: analyze
      run: code2llm ./ -f toon,evolution

    # 6. LLM validation
    - name: validate
      run: vallm batch ./ --recursive --errors-json > .pyqual/errors.json

    # 7. Auto-fix security issues if any found
    - name: security_fix
      run: |
        echo "Analyzing security findings for auto-remediation..."
        # Connect llx/aider here for security fixes
        # llx prompt "Fix security issues in .pyqual/bandit.json"
      when: metrics_fail

    # 8. Test with coverage
    - name: test
      run: pytest --cov --cov-report=json:.pyqual/coverage.json

  loop:
    max_iterations: 5
    on_fail: block       # Block on security failures

  env:
    LLM_MODEL: openrouter/qwen/qwen3-coder-next
    SECURITY_STRICT: "true"
