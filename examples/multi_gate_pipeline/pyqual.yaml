pipeline:
  name: multi-gate-full-stack

  # Comprehensive quality gates combining linters, security, testing, and AI validation
  metrics:
    # --- Code complexity ---
    cc_max: 15
    maintainability_index_min: 65

    # --- Test coverage ---
    coverage_min: 85

    # --- Linters ---
    ruff_errors_max: 5
    ruff_fatal_max: 0
    pylint_score_min: 8.0
    flake8_violations_max: 10
    mypy_errors_max: 0

    # --- Documentation ---
    docstring_coverage_min: 85

    # --- Security ---
    bandit_high_max: 0
    bandit_medium_max: 3
    vuln_critical_max: 0
    vuln_high_max: 0
    secrets_found_max: 0

    # --- AI validation ---
    vallm_pass_min: 90

  stages:
    # Phase 1: Analysis
    - name: analyze
      tool: code2llm

    # Phase 2: Linting
    - name: ruff
      tool: ruff
      optional: true

    - name: pylint
      tool: pylint
      optional: true

    - name: flake8
      tool: flake8
      optional: true

    - name: mypy
      tool: mypy
      optional: true

    - name: interrogate
      tool: interrogate
      optional: true

    # Phase 3: Security
    - name: bandit
      tool: bandit
      optional: true

    - name: pip-audit
      tool: pip-audit
      optional: true

    - name: secrets
      tool: trufflehog
      optional: true

    # Phase 4: AI validation
    - name: validate
      tool: vallm
      optional: true

    # Phase 5: AI fix (only on failure)
    - name: fix
      run: llx fix . --errors .pyqual/errors.json --verbose
      when: metrics_fail
      timeout: 600

    # Phase 6: Testing
    - name: test
      tool: pytest

    # Phase 7: Complexity
    - name: radon
      tool: radon
      optional: true

  loop:
    max_iterations: 3
    on_fail: create_ticket   # auto-create TODO.md entries for failures

  env:
    LLM_MODEL: openrouter/qwen/qwen3-coder-next
    PYTHONDONTWRITEBYTECODE: "1"
