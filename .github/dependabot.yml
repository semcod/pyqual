version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Europe/Warsaw"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
